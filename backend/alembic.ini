# ALEMBIC CONFIGURATION FILE
# This file configures Alembic for database migrations

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Sys path location, defaults to current directory
tprepend = .

# Timezone for revision timestamps
timezone = UTC

# Max length of slug in filename (truncated if exceeds)
truncate_slug_length = 40

# Version path separator (default: os.pathsep)
version_path_separator = os

# SQLAlchemy database URL
# This will be overridden by the env.py script using Flask config
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Add post-write hooks here

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
